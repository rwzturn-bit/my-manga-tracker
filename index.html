<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的漫画书架 - Manga Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
        }
        .manga-card:hover .edit-overlay {
            opacity: 1;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        .aspect-manga {
            aspect-ratio: 3 / 4;
        }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="max-w-6xl mx-auto px-4 py-8">
        <!-- Header -->
        <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">漫画进度馆</h1>
                <p class="text-slate-500">记录你的每一份感动</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-indigo-200 transition-all flex items-center gap-2">
                    <i class="fas fa-plus"></i> 添加新作品
                </button>
            </div>
        </header>

        <!-- Stats -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-slate-400 text-sm">总藏书</div>
                <div id="stat-total" class="text-2xl font-bold">0</div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-slate-400 text-sm">正在阅读</div>
                <div id="stat-reading" class="text-2xl font-bold text-indigo-600">0</div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-slate-400 text-sm">已读完</div>
                <div id="stat-completed" class="text-2xl font-bold text-emerald-600">0</div>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="text-slate-400 text-sm">平均评分</div>
                <div id="stat-rating" class="text-2xl font-bold text-amber-500">0.0</div>
            </div>
        </div>

        <!-- Filters & Search -->
        <div class="flex flex-col md:flex-row gap-4 mb-6">
            <div class="relative flex-1">
                <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="searchInput" oninput="renderManga()" placeholder="搜索漫画名称..." class="w-full pl-11 pr-4 py-2.5 bg-white border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
            </div>
            <select id="statusFilter" onchange="renderManga()" class="bg-white border border-slate-200 rounded-xl px-4 py-2.5 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                <option value="all">所有状态</option>
                <option value="reading">正在读</option>
                <option value="completed">已读完</option>
                <option value="dropped">已弃坑</option>
                <option value="wishlist">想看</option>
            </select>
        </div>

        <!-- Manga Grid -->
        <div id="mangaGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- Cards injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden flex flex-col items-center justify-center py-20 text-slate-400">
            <i class="fas fa-book-open text-6xl mb-4 opacity-20"></i>
            <p>书架空空如也，快去添加漫画吧！</p>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-lg rounded-3xl shadow-2xl overflow-hidden max-h-[90vh] flex flex-col">
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center">
                <h3 id="modalTitle" class="text-xl font-bold">添加新漫画</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="mangaForm" class="p-6 space-y-4 overflow-y-auto custom-scrollbar">
                <input type="hidden" id="editIndex" value="">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">漫画名称*</label>
                    <input type="text" id="title" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">封面图片链接 (URL)</label>
                    <input type="url" id="coverUrl" placeholder="https://example.com/cover.jpg" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">跳转详情链接 (URL)</label>
                    <input type="url" id="customLink" placeholder="https://kzo.moe/..." class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">当前进度 (话/卷)</label>
                        <input type="number" id="progress" placeholder="0" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">阅读状态</label>
                        <select id="status" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="reading">正在读</option>
                            <option value="completed">已读完</option>
                            <option value="dropped">已弃坑</option>
                            <option value="wishlist">想看</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">我的评分 (1-10)</label>
                    <input type="range" id="rating" min="0" max="10" step="0.5" value="5" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600">
                    <div class="flex justify-between text-xs text-slate-400 mt-1">
                        <span>0</span><span id="ratingVal">5.0</span><span>10</span>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">心得评价</label>
                    <textarea id="comment" rows="3" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none" placeholder="写下你的读后感..."></textarea>
                </div>
                <button type="submit" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition-colors">保存到书架</button>
            </form>
        </div>
    </div>

    <script>
        // Data management
        let mangas = JSON.parse(localStorage.getItem('myMangaLibrary')) || [];

        const mangaGrid = document.getElementById('mangaGrid');
        const emptyState = document.getElementById('emptyState');
        const mangaForm = document.getElementById('mangaForm');
        const ratingInput = document.getElementById('rating');
        const ratingVal = document.getElementById('ratingVal');

        // Placeholder cover
        const PLACEHOLDER_IMAGE = "https://via.placeholder.com/300x400?text=No+Cover";

        // Update rating display
        ratingInput.addEventListener('input', (e) => {
            ratingVal.textContent = parseFloat(e.target.value).toFixed(1);
        });

        // Initialize
        window.onload = () => {
            renderManga();
            updateStats();
        };

        function updateStats() {
            document.getElementById('stat-total').textContent = mangas.length;
            document.getElementById('stat-reading').textContent = mangas.filter(m => m.status === 'reading').length;
            document.getElementById('stat-completed').textContent = mangas.filter(m => m.status === 'completed').length;
            
            const withRatings = mangas.filter(m => m.rating > 0);
            const avg = withRatings.length ? (withRatings.reduce((a, b) => a + parseFloat(b.rating), 0) / withRatings.length).toFixed(1) : "0.0";
            document.getElementById('stat-rating').textContent = avg;
        }

        function renderManga() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filter = document.getElementById('statusFilter').value;
            
            const filtered = mangas.filter(m => {
                const matchesSearch = m.title.toLowerCase().includes(searchTerm);
                const matchesFilter = filter === 'all' || m.status === filter;
                return matchesSearch && matchesFilter;
            });

            if (filtered.length === 0) {
                mangaGrid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            mangaGrid.innerHTML = filtered.map((m, index) => {
                const statusColors = {
                    reading: 'bg-indigo-100 text-indigo-700',
                    completed: 'bg-emerald-100 text-emerald-700',
                    dropped: 'bg-rose-100 text-rose-700',
                    wishlist: 'bg-slate-100 text-slate-600'
                };
                const statusText = {
                    reading: '正在阅读',
                    completed: '已读完',
                    dropped: '已弃坑',
                    wishlist: '想看'
                };

                const realIndex = mangas.indexOf(m);
                const targetUrl = m.customLink || `https://kzo.moe/search?q=${encodeURIComponent(m.title)}`;
                const cover = m.coverUrl || PLACEHOLDER_IMAGE;

                return `
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden hover:shadow-md transition-shadow group relative flex flex-col">
                        <!-- Cover Image -->
                        <div class="relative aspect-manga bg-slate-200 overflow-hidden">
                            <img src="${cover}" alt="${m.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" onerror="this.src='${PLACEHOLDER_IMAGE}'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                                <span class="text-white text-xs font-medium bg-black/40 backdrop-blur-sm px-2 py-1 rounded">查看详情</span>
                            </div>
                        </div>

                        <div class="p-5 flex-1 flex flex-col">
                            <div class="flex justify-between items-start mb-2">
                                <span class="px-2.5 py-1 rounded-md text-xs font-bold ${statusColors[m.status]}">
                                    ${statusText[m.status]}
                                </span>
                                <div class="flex gap-2">
                                    <button onclick="editManga(${realIndex})" class="text-slate-400 hover:text-indigo-600 transition-colors"><i class="fas fa-edit text-sm"></i></button>
                                    <button onclick="deleteManga(${realIndex})" class="text-slate-400 hover:text-rose-600 transition-colors"><i class="fas fa-trash text-sm"></i></button>
                                </div>
                            </div>
                            <h3 class="text-lg font-bold mb-1 line-clamp-1" title="${m.title}">${m.title}</h3>
                            <div class="flex items-center gap-2 text-sm text-slate-500 mb-3">
                                <i class="fas fa-bookmark text-indigo-400"></i> <span class="font-semibold text-slate-700">${m.progress || 0}</span> 话
                                <span class="mx-1">•</span>
                                <i class="fas fa-star text-amber-400"></i> <span class="font-semibold text-slate-700">${m.rating}</span>
                            </div>
                            <div class="text-sm text-slate-500 italic mb-4 line-clamp-2 min-h-[40px]">
                                "${m.comment || '暂无评价...'}"
                            </div>
                            <a href="${targetUrl}" target="_blank" 
                               class="mt-auto flex items-center justify-center gap-2 w-full py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-600 hover:bg-slate-100 transition-colors text-sm font-medium">
                                <i class="fas fa-external-link-alt"></i> 前往详情页 
                            </a>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Modal Logic
        function openModal(isEdit = false) {
            document.getElementById('modal').classList.remove('hidden');
            if (!isEdit) {
                document.getElementById('modalTitle').textContent = '添加新漫画';
                document.getElementById('editIndex').value = '';
                mangaForm.reset();
                ratingVal.textContent = "5.0";
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // CRUD Operations
        mangaForm.onsubmit = (e) => {
            e.preventDefault();
            const editIndex = document.getElementById('editIndex').value;
            const newManga = {
                title: document.getElementById('title').value,
                coverUrl: document.getElementById('coverUrl').value,
                customLink: document.getElementById('customLink').value,
                progress: document.getElementById('progress').value,
                status: document.getElementById('status').value,
                rating: document.getElementById('rating').value,
                comment: document.getElementById('comment').value
            };

            if (editIndex !== "") {
                mangas[editIndex] = newManga;
            } else {
                mangas.push(newManga);
            }

            saveAndRefresh();
            closeModal();
        };

        function editManga(index) {
            const m = mangas[index];
            document.getElementById('editIndex').value = index;
            document.getElementById('title').value = m.title;
            document.getElementById('coverUrl').value = m.coverUrl || "";
            document.getElementById('customLink').value = m.customLink || "";
            document.getElementById('progress').value = m.progress;
            document.getElementById('status').value = m.status;
            document.getElementById('rating').value = m.rating;
            document.getElementById('ratingVal').textContent = parseFloat(m.rating).toFixed(1);
            document.getElementById('comment').value = m.comment;
            
            document.getElementById('modalTitle').textContent = '编辑漫画信息';
            openModal(true);
        }

        function deleteManga(index) {
            if (confirm(`确定要从书架删除《${mangas[index].title}》吗？`)) {
                mangas.splice(index, 1);
                saveAndRefresh();
            }
        }

        function saveAndRefresh() {
            localStorage.setItem('myMangaLibrary', JSON.stringify(mangas));
            renderManga();
            updateStats();
        }
    </script>
</body>
</html>
